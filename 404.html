<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VISION SOLDIER</title>
  <style>
    body {
      margin: 0;
      background: #050A14;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Rajdhani', sans-serif;
      color: #00A8FF;
    }
    p { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
  </style>
  <script>
    // Redirigir a la raíz de la app (fix GitHub Pages 404 en subdirectorios)
    (function () {
      var seg = window.location.pathname.split('/');
      // Detectar base path de GitHub Pages (primer segmento del pathname)
      var basePath = '/' + (seg[1] ? seg[1] + '/' : '');
      window.location.replace(basePath);
    })();
  </script>
</head>
<body>
  <p>Redirigiendo a VISION SOLDIER…</p>
</body>
</html>
